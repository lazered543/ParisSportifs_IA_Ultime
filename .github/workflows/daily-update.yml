name: Daily IA Betting Update

on:
  workflow_dispatch:

  schedule:
    # GitHub utilise UTC : 22:05 couvre minuit France en ete, 23:05 en hiver.
    - cron: "5 22,23 * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily automation
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: .

        run: |
          python scripts/daily_auto.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git pull --rebase origin main || true

          git add data/predictions
          git add data/processed
          git add tracking_results.csv
          git add data/telegram_sent.csv

          git commit -m "Daily update predictions" || echo "No changes"

          git push
